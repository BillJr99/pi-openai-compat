name: Publish to npm

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Remove token auth injected by setup-node
        # setup-node writes an .npmrc with GITHUB_TOKEN as _authToken which
        # blocks OIDC auth. Deleting it lets npm request an OIDC token instead.
        run: rm -f "$NPM_CONFIG_USERCONFIG"

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "chore: auto-bump patch version to $(node -p "require('./package.json').version") [skip ci]"
          git push

      - name: Publish to npm
        run: npm publish --access public --provenance
